<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sổ Cái Alpha — Complete (Auto‑reset 7h & new score color)</title>
<style>
:root{
  --bg:#0b0e14; --panel:#121826; --control:#0f1421; --muted:#94a3b8; --text:#e5e7eb;
  --accent:#f59e0b; --accent2:#fbbf24; --border:#243149; --dash:#2b3b5e;
  --grid:#23324d; --green:#16a34a; --greenText:#052e16;
  /* NEW score colors */
  --scoreBg:#1D2A6A;      /* indigo */
  --scoreText:#E0E7FF;    /* indigo-100 */
  --btn:#f59e0b; --btn2:#fbbf24;
  --otpBg:#0b1220; --otpText:#fef9c3;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:15px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Helvetica Neue,Arial}
.container{max-width:1200px;margin:0 auto;padding:16px}

/* Header / Toolbar */
header{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.title{display:flex;gap:10px;align-items:center}
.title h1{font-size:28px;margin:0;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.pill{font-size:12px;background:rgba(148,163,184,.15);border:1px solid var(--border);padding:4px 10px;border-radius:999px;color:var(--muted)}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;min-width:380px}
.toolbar .navbtn{width:36px;height:36px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;background:var(--control);border:1px solid var(--border);cursor:pointer}
.toolbar .navbtn:active{transform:translateY(1px)}
.toolbar .month{min-width:170px;text-align:center}
.toolbar select{height:36px;border-radius:999px;background:var(--control);border:1px solid var(--border);padding:0 12px;color:var(--text)}
.toolbar .ghost{height:36px;border-radius:999px;border:1px dashed var(--border);background:transparent;color:var(--muted);padding:0 12px;cursor:pointer}
.toolbar input[type=file]{display:none}
@media (max-width:720px){ .toolbar{min-width:0} .toolbar .month{min-width:140px} }

/* Cards */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:0 12px 32px rgba(2,6,23,.45)}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{padding:16px}
.card .label{font-size:13px;color:var(--muted)}
.card .value{font-size:28px;font-weight:800;margin-top:6px}

/* Hotlist */
.banner{border:1px solid var(--border);background:rgba(148,163,184,.08);padding:12px 14px;border-radius:14px;margin:12px 0}
.banner .header{display:flex;align-items:center;gap:8px;justify-content:space-between;margin-bottom:8px}
.banner .right{display:flex;align-items:center;gap:8px}
.tgl{height:28px;border-radius:999px;border:1px solid var(--border);background:rgba(148,163,184,.12);color:var(--muted);padding:0 10px;cursor:pointer}
.tgl.on{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#111827;border:0}

.hotlist{display:grid;grid-template-columns:1fr 70px 120px 88px;border:1px solid var(--grid);border-radius:8px;overflow:hidden}
.row{display:contents}
.cell{min-height:30px;display:flex;align-items:center}
.cell.name{background:linear-gradient(0deg, rgba(22,163,74,.98), rgba(22,163,74,.98));color:#001b0a;padding:0 10px;border-right:1px solid var(--grid)}
.cell.score{background:var(--scoreBg);color:var(--scoreText);justify-content:center;font-weight:800;position:relative}
.cell.otp{background:var(--otpBg);color:var(--otpText);justify-content:center;font-weight:900;letter-spacing:1px;cursor:pointer;position:relative}
.cell.bonus{background:linear-gradient(90deg,var(--btn),var(--btn2));color:#1f2937;justify-content:center;font-weight:800;cursor:pointer}
.hotlist > *{border-bottom:1px solid var(--grid)} .hotlist > :nth-last-child(-n+4){border-bottom:none}
/* score inline edit */
.cell.score .display{pointer-events:none}
.cell.score input{position:absolute;inset:0;width:100%;height:100%;border:0;background:transparent;color:var(--scoreText);font:inherit;font-weight:800;text-align:center;outline:none;display:none}
.cell.score.editing input{display:block}.cell.score.editing .display{opacity:0}
.cell.score input::-webkit-outer-spin-button,.cell.score input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cell.score input{-moz-appearance:textfield;appearance:textfield}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
.otp-hint{position:absolute;inset:auto 8px 4px auto;font-size:10px;color:#94a3b8}

/* Calendar */
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin:12px 0 8px}
.cal-head div{font-size:12px;color:var(--muted);text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{min-height:120px;background:var(--control);border:1px dashed var(--dash);border-radius:14px;padding:10px;position:relative}
.day.other{opacity:.45}
.day.today{outline:2px solid var(--accent); outline-offset:-2px;}
.dnum{font-size:12px;color:var(--muted)}

/* Dialogs */
dialog{border:0;background:transparent} dialog::backdrop{background:rgba(2,6,23,.65)}
.modal{background:#fff;border-radius:16px;box-shadow:0 30px 80px rgba(2,6,23,.35);color:#0f172a;min-width:min(820px,92vw)}
.modal .head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #eef2f7}
.modal .date{font-weight:800;font-size:18px}
.modal .weekday{font-size:12px;background:#f1f5f9;color:#334155;padding:4px 10px;border-radius:999px;margin-left:8px}
.modal .body{padding:16px 20px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-weight:700;color:#0f172a}
.control{display:flex;align-items:center;border:1px solid #e5e7eb;background:#fff;color:#0f172a;border-radius:10px;height:44px;padding:0 12px}
.control input{flex:1;height:100%;border:0;background:transparent;font:inherit}
.textarea{border:1px solid #e5e7eb;background:#fff;color:#0f172a;border-radius:10px;padding:10px 12px;min-height:84px}
.modal .foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #eef2f7;background:#fafafa;border-bottom-left-radius:16px;border-bottom-right-radius:16px}
.btn-lg{height:40px;border-radius:10px;padding:0 14px;border:1px solid #e5e7eb;background:#fff;color:#0f172a;cursor:pointer}
.btn-lg.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border:0}
.btn-lg.destroy{background:#111827;color:#fff;border:0}
.num{text-align:right}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">
      <h1>Sổ Thu Chi Alpha Binance</h1>
      <span class="pill">Local‑only</span>
    </div>
    <div class="toolbar">
      <button class="navbtn" id="prevBtn" aria-label="Tháng trước">◀</button>
      <div id="monthLabel" class="pill month" aria-live="polite"></div>
      <button class="navbtn" id="nextBtn" aria-label="Tháng sau">▶</button>
      <select id="userSelect" aria-label="Người dùng"></select>
      <button class="ghost" id="exportBtn">Sao lưu</button>
      <label class="ghost" for="importFile" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer">Khôi phục<input id="importFile" type="file" accept="application/json"/></label>
    </div>
  </header>

  <div class="cards">
    <div class="panel card"><div class="label">Tổng thu (USDT)</div><div class="value" id="totalIncome">0</div></div>
    <div class="panel card"><div class="label">Lợi nhuận (Thu - Chi)</div><div class="value" id="totalProfit">0</div></div>
    <div class="panel card"><div class="label">Tháng này: Thu</div><div class="value" id="monthIncome">0</div></div>
    <div class="panel card"><div class="label">Tháng này: Lợi nhuận</div><div class="value" id="monthProfit">0</div></div>
  </div>

  <div class="banner">
    <div class="header">
      <div style="font-weight:700;color:var(--muted)">Danh sách nhanh (gọn) + OTP</div>
      <div class="right">
        <button id="autoResetBtn" class="tgl">Tự reset 07:00</button>
        <button id="editHotlistBtn" class="tgl" style="border-style:solid">Sửa danh sách</button>
      </div>
    </div>
    <div id="hotlist" class="hotlist"></div>
    <div class="hint">Click số để sửa • Lăn chuột: ±1 (Shift: ±5) • Bấm “+18 điểm” • Click ô OTP để đặt/ đổi secret (Base32)</div>
  </div>

  <section class="calendar panel">
    <div class="cal-head"><div>CN</div><div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div></div>
    <div class="cal-grid" id="calGrid"></div>
  </section>
</div>

<!-- Edit Day -->
<dialog id="editDialog">
  <div class="modal">
    <div class="head">
      <div><span class="date" id="editDateLabel"></span><span class="weekday" id="weekdayLabel"></span></div>
      <button class="btn-lg" onclick="editDialog.close()">✕</button>
    </div>
    <div class="body">
      <div class="grid2">
        <div class="field"><label>Thu (USDT)</label><div class="control"><input id="m_income" class="num" inputmode="decimal" placeholder="Nhập số tiền…"></div></div>
        <div class="field"><label>Chi (USDT)</label><div class="control"><input id="m_expense" class="num" inputmode="decimal" placeholder="Nhập số tiền…"></div></div>
        <div class="field" style="grid-column:1/-1"><label>Ghi chú</label><textarea id="m_note" class="textarea" placeholder="Ví dụ: FRM airdrop, Alpha Launchpad #12…"></textarea></div>
      </div>
    </div>
    <div class="foot">
      <button class="btn-lg destroy" onclick="clearDay()">Xóa ngày</button>
      <button class="btn-lg" onclick="editDialog.close()">Hủy</button>
      <button class="btn-lg primary" id="saveBtn">Lưu</button>
    </div>
  </div>
</dialog>

<!-- Hotlist editor -->
<dialog id="hotlistModal">
  <div class="modal">
    <div class="head"><strong>Chỉnh sửa danh sách nhanh</strong><button class="btn-lg" onclick="hotlistModal.close()">✕</button></div>
    <div class="body"><textarea id="hotlistInput" class="textarea" style="width:100%;min-height:180px"></textarea></div>
    <div class="foot"><button class="btn-lg" onclick="hotlistModal.close()">Hủy</button><button class="btn-lg primary" onclick="saveHotlistFromEditor()">Lưu danh sách</button></div>
  </div>
</dialog>

<script>
const $=(q)=>document.querySelector(q);
const storeKey='alpha_ledger_v1', hotlistKey='alpha_hotlist', otpKey='alpha_hotlist_2fa';
const resetFlagKey='alpha_auto_reset_scores', resetLastKey='alpha_auto_reset_last';

/* ===== Base32 + TOTP ===== */
const B32='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
function base32ToBytes(b32){b32=(b32||'').replace(/=+$/,'').replace(/\s+/g,'').toUpperCase();let bits='',out=[];for(const ch of b32){const v=B32.indexOf(ch);if(v<0) continue;bits+=v.toString(2).padStart(5,'0');}for(let i=0;i+8<=bits.length;i+=8){out.push(parseInt(bits.slice(i,i+8),2));}return new Uint8Array(out);}
async function totp(secretBytes, step=30, digits=6){ if(!secretBytes||!secretBytes.length) return null; const ctr=Math.floor(Date.now()/1000/step); const buf=new ArrayBuffer(8); const view=new DataView(buf); view.setUint32(4, ctr, false); const key=await crypto.subtle.importKey('raw', secretBytes, {name:'HMAC', hash:'SHA-1'}, false, ['sign']); const sig=new Uint8Array(await crypto.subtle.sign('HMAC', key, buf)); const off=sig[sig.length-1]&0xf; const bin=((sig[off]&0x7f)<<24)|((sig[off+1]&0xff)<<16)|((sig[off+2]&0xff)<<8)|(sig[off+3]&0xff); const mod=10**digits; const otp=(bin%mod).toString().padStart(digits,'0'); const remain=step-(Math.floor(Date.now()/1000)%step); return {otp, remain}; }

/* ===== Hotlist ===== */
const DEFAULT_HOTLIST=[
  ['lehoaiqt91@mung8.com',230],['vinhqthx2003@gmail.com',230],['langqt2024@gmail.com',230],
  ['chính chủ',155],['lebon@mung8.com',220],['lodomo888@gmail.com',205],
  ['duc@mung8.com',230],['lethilan.qt2025@gmail.com',181]
];
function loadHotlist(){ try{const s=localStorage.getItem(hotlistKey); return s?JSON.parse(s):DEFAULT_HOTLIST;}catch{return DEFAULT_HOTLIST} }
function saveHotlist(v){ try{localStorage.setItem(hotlistKey, JSON.stringify(v));}catch{} }
function loadOtpMap(){ try{const s=localStorage.getItem(otpKey); return s?JSON.parse(s):{} }catch{return {} } }
function saveOtpMap(m){ try{localStorage.setItem(otpKey, JSON.stringify(m));}catch{} }

let otpTimer=null;
async function renderHotlist(){
  const data=loadHotlist(); const secrets=loadOtpMap(); const wrap=$('#hotlist'); wrap.innerHTML=''; if(otpTimer){clearInterval(otpTimer); otpTimer=null;}
  const rowRefs=[];
  for(const [label,score] of data){
    const name=document.createElement('div'); name.className='cell name row'; name.textContent=label;

    const scoreCell=document.createElement('div'); scoreCell.className='cell score row';
    const disp=document.createElement('div'); disp.className='display'; disp.textContent=score;
    const inp=document.createElement('input'); inp.type='text'; inp.inputMode='numeric'; inp.pattern='[0-9]*'; inp.value=score;
    scoreCell.appendChild(disp); scoreCell.appendChild(inp);
    scoreCell.addEventListener('click',()=>{ scoreCell.classList.add('editing'); inp.value=disp.textContent.trim(); inp.focus(); inp.select(); });
    function commit(){ const v=Number((inp.value||'').replace(/[^0-9.-]/g,'')); if(!Number.isNaN(v)){ const list=loadHotlist(); const idx=list.findIndex(x=>x[0]===label); if(idx>=0){ list[idx][1]=v; saveHotlist(list); disp.textContent=v; } } scoreCell.classList.remove('editing'); }
    inp.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){e.preventDefault();commit()} else if(e.key==='Escape'){ e.preventDefault(); scoreCell.classList.remove('editing'); } });
    inp.addEventListener('blur',commit);
    scoreCell.addEventListener('wheel',(e)=>{ e.preventDefault(); const step=e.shiftKey?5:1; const dir=e.deltaY<0?1:-1; const cur=Number(disp.textContent.trim()||0); const list=loadHotlist(); const idx=list.findIndex(x=>x[0]===label); if(idx>=0){ list[idx][1]=cur+dir*step; saveHotlist(list); disp.textContent=list[idx][1]; } }, {passive:false});

    const otpCell=document.createElement('div'); otpCell.className='cell otp row';
    const otpSpan=document.createElement('span'); otpSpan.textContent='••••••'; otpCell.appendChild(otpSpan);
    const hint=document.createElement('div'); hint.className='otp-hint'; hint.textContent=''; otpCell.appendChild(hint);
    otpCell.title='Bấm để đặt/đổi secret (Base32). Để trống để xóa.';
    otpCell.addEventListener('click',()=>{
      const curSecret=loadOtpMap()[label]||'';
      const input=prompt('Nhập secret 2FA (Base32) cho\n'+label+'\n(để trống để xóa):', curSecret);
      if(input===null) return;
      const map=loadOtpMap(); const trimmed=(input||'').trim();
      if(trimmed===''){ delete map[label]; } else { map[label]=trimmed; }
      saveOtpMap(map);
      const bytes=base32ToBytes(map[label]||'');
      const ref=rowRefs.find(r=>r.label===label); if(ref){ ref.secretBytes=bytes; }
    });

    const bonus=document.createElement('div'); bonus.className='cell bonus row'; bonus.textContent='+18 điểm';
    bonus.addEventListener('click',()=>{ const list=loadHotlist(); const idx=list.findIndex(x=>x[0]===label); if(idx>=0){ list[idx][1]=(+list[idx][1]||0)+18; saveHotlist(list); disp.textContent=list[idx][1]; } });

    wrap.appendChild(name); wrap.appendChild(scoreCell); wrap.appendChild(otpCell); wrap.appendChild(bonus);
    rowRefs.push({label, el:otpSpan, hint, secretBytes:base32ToBytes(secrets[label]||'')});
  }

  async function tick(){
    for(const r of rowRefs){
      if(!r.secretBytes || r.secretBytes.length===0){ r.el.textContent='••••••'; r.hint.textContent=''; continue; }
      try{ const {otp, remain}=await totp(r.secretBytes,30,6); r.el.textContent=otp; r.hint.textContent=remain+'s'; }catch(e){ r.el.textContent='error'; r.hint.textContent=''; }
    }
  }
  tick(); otpTimer=setInterval(tick,1000);
}

/* ===== Calendar helpers (timezone-safe) ===== */
function fmtDateLocal(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;}
function parseLocalDate(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,(m||1)-1,d||1);}
const today=new Date(); let viewYear=today.getFullYear(), viewMonth=today.getMonth();
function loadDB(){ try{return JSON.parse(localStorage.getItem(storeKey)) || {users:{}, currentUser:''}; }catch(e){ return {users:{}, currentUser:''}; } }
function saveDB(db){ localStorage.setItem(storeKey, JSON.stringify(db)); }
function ensureDefaultUser(){ const db=loadDB(); if(!db.currentUser){ const def='User-1'; db.users[def]={days:{}}; db.currentUser=def; saveDB(db);} }
function renderUsers(){ const db=loadDB(); const sel=$('#userSelect'); sel.innerHTML=''; Object.keys(db.users).forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; if(n===db.currentUser) o.selected=true; sel.appendChild(o);}); }

function computeTotals(){
  const db=loadDB(); const u=db.users[db.currentUser]||{days:{}}; let ti=0,te=0,mi=0,me=0;
  const s=new Date(viewYear,viewMonth,1), e=new Date(viewYear,viewMonth+1,0);
  for(const [ds,r] of Object.entries(u.days)){
    const d=parseLocalDate(ds), i=+r.income||0, x=+r.expense||0; ti+=i; te+=x; if(d>=s&&d<=e){ mi+=i; me+=x; }
  }
  return {ti, tf:ti-te, mi, mf:mi-me};
}
function renderStats(){ const t=computeTotals(); $('#totalIncome').textContent=t.ti; $('#totalProfit').textContent=t.tf; $('#monthIncome').textContent=t.mi; $('#monthProfit').textContent=t.mf; }

function renderCalendar(){
  $('#monthLabel').textContent=new Date(viewYear,viewMonth,1).toLocaleString('vi-VN',{month:'long',year:'numeric'});
  const grid=$('#calGrid'); grid.innerHTML='';
  const first=new Date(viewYear,viewMonth,1); const start=new Date(first); start.setDate(first.getDate()-first.getDay());
  const cells=42; const db=loadDB(); const u=db.users[db.currentUser]||{days:{}}; const todayStr=fmtDateLocal(new Date());
  for(let k=0;k<cells;k++){
    const d=new Date(start); d.setDate(start.getDate()+k);
    const inMonth=(d.getMonth()===viewMonth);
    const dateStr=fmtDateLocal(d);
    const rec=u.days[dateStr]||{};
    const cell=document.createElement('div'); cell.className='day'+(inMonth?'':' other')+(dateStr===todayStr?' today':'');
    const num=document.createElement('div'); num.className='dnum'; num.textContent=d.getDate(); cell.appendChild(num);
    if(rec.note){ const note=document.createElement('div'); note.style.marginTop='6px'; note.style.fontSize='12px'; note.style.color='#94a3b8'; note.textContent=rec.note.substring(0,60); cell.appendChild(note); }
    const chips=document.createElement('div'); chips.style.position='absolute'; chips.style.bottom='8px'; chips.style.left='10px'; chips.style.display='flex'; chips.style.gap='6px';
    const income=+rec.income||0, expense=+rec.expense||0;
    if(income){ const c=document.createElement('span'); c.style.fontSize='12px'; c.style.padding='2px 6px'; c.style.borderRadius='999px'; c.style.border='1px solid rgba(16,185,129,.6)'; c.textContent=`+${income}`; chips.appendChild(c); }
    if(expense){ const c=document.createElement('span'); c.style.fontSize='12px'; c.style.padding='2px 6px'; c.style.borderRadius='999px'; c.style.border='1px solid rgba(239,68,68,.6)'; c.textContent=`-${expense}`; chips.appendChild(c); }
    cell.appendChild(chips);
    cell.addEventListener('click',()=>openEdit(dateStr));
    grid.appendChild(cell);
  }
}

/* ===== Edit Day ===== */
let currentEditDate=null;
function openEdit(dateStr){
  currentEditDate=dateStr;
  $('#editDateLabel').textContent=dateStr;
  const d=parseLocalDate(dateStr); $('#weekdayLabel').textContent=d.toLocaleDateString('vi-VN',{weekday:'long'});
  const db=loadDB(); const u=db.users[db.currentUser]||{days:{}}; const rec=u.days[dateStr]||{};
  $('#m_income').value=rec.income??''; $('#m_expense').value=rec.expense??''; $('#m_note').value=rec.note??'';
  editDialog.showModal();
}
function saveDay(){
  const db=loadDB(); const u=db.users[db.currentUser]; if(!u) return;
  const rec={}; const a=$('#m_income').value.trim(), b=$('#m_expense').value.trim(), n=$('#m_note').value.trim();
  if(a!=='') rec.income=Number(a); if(b!=='') rec.expense=Number(b); if(n!=='') rec.note=n;
  if(Object.keys(rec).length===0) delete u.days[currentEditDate]; else u.days[currentEditDate]=rec;
  saveDB(db); editDialog.close(); renderStats(); renderCalendar();
}
function clearDay(){ const db=loadDB(); const u=db.users[db.currentUser]; if(!u) return; delete u.days[currentEditDate]; saveDB(db); editDialog.close(); renderStats(); renderCalendar(); }
$('#saveBtn').addEventListener('click',saveDay);
window.addEventListener('keydown',(e)=>{ if(!editDialog.open) return; if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); saveDay(); } if(e.key==='Escape'){ editDialog.close(); }});

/* ===== Backup / Restore ===== */
function exportAll(){
  const payload={
    ledger: JSON.parse(localStorage.getItem(storeKey)||'{}'),
    hotlist: JSON.parse(localStorage.getItem(hotlistKey)||'[]'),
    otp: JSON.parse(localStorage.getItem(otpKey)||'{}'),
    autoReset: JSON.parse(localStorage.getItem(resetFlagKey)||'false'),
    lastReset: localStorage.getItem(resetLastKey)||'',
    _meta: { app:'so-cai-alpha', ts:new Date().toISOString() }
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='alpha-ledger-backup.json'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
$('#exportBtn').addEventListener('click',exportAll);
$('#importFile').addEventListener('change',async (e)=>{
  const f=e.target.files[0]; if(!f) return;
  const text=await f.text();
  try{
    const data=JSON.parse(text);
    if(data.ledger) localStorage.setItem(storeKey, JSON.stringify(data.ledger));
    if(data.hotlist) localStorage.setItem(hotlistKey, JSON.stringify(data.hotlist));
    if(data.otp) localStorage.setItem(otpKey, JSON.stringify(data.otp));
    if(typeof data.autoReset==='boolean') localStorage.setItem(resetFlagKey, JSON.stringify(data.autoReset));
    if(data.lastReset) localStorage.setItem(resetLastKey, data.lastReset);
    alert('Khôi phục xong!');
    renderUsers(); renderStats(); renderCalendar(); renderHotlist(); updateResetToggleUI();
  }catch(err){ alert('File không hợp lệ.'); }
  e.target.value='';
});

/* ===== Auto reset scores at 07:00 ===== */
function getTodayStr(){ const d=new Date(); return d.toISOString().slice(0,10); } // YYYY-MM-DD UTC, only used for uniqueness
function isAutoResetOn(){ try{return JSON.parse(localStorage.getItem(resetFlagKey)||'false');}catch{return false;} }
function setAutoReset(on){ localStorage.setItem(resetFlagKey, JSON.stringify(!!on)); updateResetToggleUI(); }
function updateResetToggleUI(){ const btn=$('#autoResetBtn'); if(isAutoResetOn()){ btn.classList.add('on'); } else { btn.classList.remove('on'); } }
function performReset(){ const list=loadHotlist().map(([l,_s])=>[l,0]); saveHotlist(list); localStorage.setItem(resetLastKey, getTodayStr()); renderHotlist(); }
function maybeResetNow(){
  if(!isAutoResetOn()) return;
  const now=new Date(); const last=localStorage.getItem(resetLastKey)||'';
  // Build today's 07:00 local threshold
  const threshold=new Date(now.getFullYear(), now.getMonth(), now.getDate(), 7, 0, 0, 0);
  if(now>=threshold && last!==getTodayStr()){ performReset(); }
}
// UI toggle
$('#autoResetBtn').addEventListener('click',()=>setAutoReset(!isAutoResetOn()));

/* ===== Init ===== */
(function init(){
  const db=loadDB(); if(!db.currentUser){ db.users['User-1']={days:{}}; db.currentUser='User-1'; saveDB(db); }
  renderUsers(); renderStats(); renderCalendar(); renderHotlist(); updateResetToggleUI();
  $('#prevBtn').onclick=()=>{ if(viewMonth===0){viewMonth=11;viewYear--;} else viewMonth--; renderStats(); renderCalendar(); };
  $('#nextBtn').onclick=()=>{ if(viewMonth===11){viewMonth=0;viewYear++;} else viewMonth++; renderStats(); renderCalendar(); };
  $('#userSelect').onchange=(e)=>{ const db=loadDB(); db.currentUser=e.target.value; saveDB(db); renderStats(); renderCalendar(); };
  $('#editHotlistBtn').onclick=()=>{ const data=loadHotlist(); $('#hotlistInput').value=data.map(([l,s])=>`${l}, ${s}`).join('\n'); hotlistModal.showModal(); };
  window.saveHotlistFromEditor=()=>{ const raw=$('#hotlistInput').value.trim().split(/\n+/).filter(Boolean); const out=[]; for(const line of raw){ const m=line.split(/,|\t/); if(m.length>=2){ const l=m[0].trim(); const v=Number(m[1].trim()); if(l) out.push([l, isNaN(v)?'':v]); } } if(out.length){ saveHotlist(out); renderHotlist(); hotlistModal.close(); } else alert('Không có dữ liệu hợp lệ.'); };
  // Check immediately on load, then every minute
  maybeResetNow(); setInterval(maybeResetNow, 60*1000);
  // Keyboard: arrows switch month
  window.addEventListener('keydown',(e)=>{ if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return; if(e.key==='ArrowLeft'){ $('#prevBtn').click(); } else if(e.key==='ArrowRight'){ $('#nextBtn').click(); } });
})();
</script>
